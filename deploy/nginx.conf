# ============================================================
#  /etc/nginx/sites-available/ogunlearn.com
#  
#  À copier dans /etc/nginx/sites-available/ puis activer avec :
#    sudo ln -s /etc/nginx/sites-available/ogunlearn.com /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ogunlearn.com www.ogunlearn.com;

    # Pour Let's Encrypt (challenge HTTP-01)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste vers HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Redirection www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ogunlearn.com;

    ssl_certificate     /etc/letsencrypt/live/ogunlearn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ogunlearn.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://ogunlearn.com$request_uri;
}

# Serveur HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ogunlearn.com;

    root /var/www/ogunlearn/current;
    index index.html;

    # ---- SSL ----
    ssl_certificate     /etc/letsencrypt/live/ogunlearn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ogunlearn.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ---- Sécurité (headers HSTS, CSP, etc.) ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Content Security Policy — adapter selon les besoins (Google Fonts, analytics, etc.)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/rss+xml application/atom+xml
        image/svg+xml font/ttf font/otf application/font-woff application/font-woff2;

    # Brotli si module dispo (à installer : libnginx-mod-brotli)
    # brotli on;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml;

    # ---- Cache statique (1 an pour assets versionnés Astro) ----
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|webp|avif|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- HTML : pas de cache ou cache court ----
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # ---- Routing SPA-like (Astro génère du HTML statique, on cherche le fichier) ----
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # ---- Sitemap & robots ----
    location = /sitemap-index.xml { try_files $uri =404; }
    location = /sitemap-0.xml    { try_files $uri =404; }
    location = /robots.txt       { try_files $uri =404; access_log off; }

    # ---- Erreurs custom ----
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # ---- Cacher les fichiers sensibles ----
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---- Logs ----
    access_log /var/log/nginx/ogunlearn.access.log;
    error_log  /var/log/nginx/ogunlearn.error.log;
}
